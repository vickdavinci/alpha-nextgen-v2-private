# =============================================================================
# Alpha NextGen - Pre-commit Hooks Configuration
# =============================================================================
# These hooks run automatically before each commit to catch issues early.
#
# Setup (one-time):
#   pip install pre-commit
#   pre-commit install
#
# Manual run:
#   pre-commit run --all-files
#
# Skip hooks (emergency only):
#   git commit --no-verify
# =============================================================================

repos:
  # ---------------------------------------------------------------------------
  # General file checks
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
        exclude: '\.md$'
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # ---------------------------------------------------------------------------
  # Python code formatting (Black)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.11
        args: ['--config=pyproject.toml']

  # ---------------------------------------------------------------------------
  # Python import sorting (isort)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--settings-path=pyproject.toml']

  # ---------------------------------------------------------------------------
  # Python type checking (mypy) - Optional, can be slow
  # ---------------------------------------------------------------------------
  # Uncomment when type annotations are more complete
  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v1.8.0
  #   hooks:
  #     - id: mypy
  #       args: ['--config-file=pyproject.toml']
  #       additional_dependencies: []

  # ---------------------------------------------------------------------------
  # Custom local hooks for Alpha NextGen specific checks
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      # CRITICAL: Block commits to protected branches
      - id: protect-branches
        name: Block commits to protected branches
        entry: |
          bash -c '
          branch=$(git branch --show-current)
          if [ "$branch" = "main" ] || [ "$branch" = "develop" ]; then
            echo ""
            echo "========================================"
            echo "ERROR - Direct commits to $branch blocked"
            echo "========================================"
            echo ""
            echo "Create a feature branch first:"
            echo "  git checkout -b feature/<initials>/<description>"
            echo ""
            exit 1
          fi
          '
        language: system
        always_run: true
        pass_filenames: false
        stages: [commit]

      # Shared AI/human plumbing gate (lightweight path for commit-time speed)
      - id: shared-gate-light
        name: Shared process gate (light)
        entry: bash scripts/gate.sh changed --no-tests --staged-only
        language: system
        files: ^(engines/satellite/|portfolio/|execution/|persistence/|scheduling/|utils/|models/|main\.py$|main_.*_mixin\.py$|config\.py$|scripts/.*\.py$|scripts/.*\.sh$)
        pass_filenames: true
        stages: [commit]

      # Check for print() statements in source files
      - id: no-print-statements
        name: Check for print() statements
        entry: python -c "import sys; sys.exit(1 if 'print(' in open(sys.argv[1]).read() else 0)"
        language: python
        files: ^(engines|portfolio|execution|models|persistence|scheduling|utils)/.*\.py$
        exclude: __pycache__

      # Check for datetime.now() usage
      - id: no-datetime-now
        name: Check for datetime.now() usage
        entry: python -c "import sys; content=open(sys.argv[1]).read(); sys.exit(1 if 'datetime.now()' in content or 'datetime.today()' in content else 0)"
        language: python
        files: ^(engines|portfolio|execution|models|persistence|scheduling|utils)/.*\.py$
        exclude: __pycache__

      # Check for time.sleep() usage
      - id: no-time-sleep
        name: Check for time.sleep() usage
        entry: python -c "import sys; sys.exit(1 if 'time.sleep(' in open(sys.argv[1]).read() else 0)"
        language: python
        files: ^(engines|portfolio|execution|models|persistence|scheduling|utils)/.*\.py$
        exclude: __pycache__

# =============================================================================
# CI Configuration
# =============================================================================
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
